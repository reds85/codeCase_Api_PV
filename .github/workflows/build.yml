name: Integration CodeCase API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  Codecase-API-Test:
    name: Test Codecase API
    runs-on: ubuntu-latest
    services:
      mysql_server:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=3

    steps:

      - name: installation java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=reds85_codeCase_Api_PV

      - name: Charging artefact #Permet de charger un artefact
        uses: actions/upload-artifact@v4
        with:
          name: package.jar
          path: target/*.jar
          retention-days: 1

      - name: MS Teams Incoming Webhook Notification
        uses: mikesprague/teams-incoming-webhook-action@v2.0.3

  #On va créer l'image de l'api Code Case avec un docker
  Creation-CodeCase-API-docker-image:
    name: Création de l'image docker de codecaseapi
    # Ce job ne va se lancer uniquement si les tests précédents réussissent
    needs: Codecase-API-Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      # Attention : Vous essayez de lancer des commandes MySQL ici.
      # Ce job est un nouveau conteneur tout propre, il n'a pas accès au MySQL du Job précédent.
      - name: Initialisation de la BDD (si nécessaire pour le build)
        run: |
          mysql -h 127.0.0.1 -u root -p'${{ secrets.DB_PASSWORD }}' -e "CREATE DATABASE IF NOT EXISTS ${{ secrets.DB_NAME }};"
          mysql -h 127.0.0.1 -u root -p'${{ secrets.DB_PASSWORD }}' ${{ secrets.DB_NAME }} < bdddumps/script.sql

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construction et publication
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/codecaseapi:latest
            ${{ secrets.DOCKER_USERNAME }}/codecaseapi:${{ github.sha }}

  # On deploie
  Deploiement-CodeCase-Api:
    name: Déploiement de l'api
    # On attend que l'image docker est été crée
    needs: Creation-CodeCase-API-docker-image
    runs-on: ubuntu-latest

    steps:
      - name: Déploiement
        run: echo "Ici, on déploie l'image créée précédemment"


