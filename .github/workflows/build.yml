name: Integration CodeCase API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  checks: write
  contents: write # Requis pour publier Allure sur GitHub Pages si besoin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  Codecase-API-Test:
    name: Test Codecase API
    runs-on: ubuntu-latest
    services:
      mysql_server:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Attente MySQL # on ajout -u root et le mot de passe pour éviter que la boucle ne tourne à l'inifi
        run : |
          while ! mysqladmin ping -h"127.0.0.1" -u root -p'${{ secrets.DB_PASSWORD }}' --silent; do
            echo "En attente de MySQL..."
            sleep 2
          done

      - name: Création BDD depuis script
        run: mysql -h 127.0.0.1 -u root -p'${{ secrets.DB_PASSWORD }}' ${{ secrets.DB_NAME }} < bdddumps/script.sql

      - name: installation java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=reds85_codeCase_Api_PV
          mvn allure:report

      - name: Déploiement du rapport sur github pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ALLURE_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          destination_dir: allure-report
          keep_files: false

      - name: Charging artefact #Permet de charger un artefact 1
        uses: actions/upload-artifact@v4
        with:
          name: package.jar
          path: target/*.jar
          retention-days: 1

  #On va créer l'image de l'api Code Case avec un docker
  Creation-CodeCase-API-docker-image:
    name: Création de l'image docker de codecaseapi
    # Ce job ne va se lancer uniquement si les tests précédents réussissent
    needs: Codecase-API-Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement
        run: echo "Ici, on déploie l'image créée précédemment"

      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: package.jar
          path: target/

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construction et publication
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/codecaseapi:latest
            ${{ secrets.DOCKER_USERNAME }}/codecaseapi:${{ github.sha }}
